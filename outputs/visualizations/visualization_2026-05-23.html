<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily AI Insight Report</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .hero { background: linear-gradient(135deg, #2563eb, #0f172a); color: white; padding: 24px; border-radius: 16px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 20px 0; }
    .card, .panel { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
    .charts { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .chart { height: 360px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    h1, h2, h3 { margin-top: 0; }
    ul { margin: 0; padding-left: 20px; }
    .muted { color: #cbd5e1; }
    @media (max-width: 900px) { .cards, .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Daily AI Insight Report</h1>
      <p>日期：<span id="report-date"></span></p>
      <p class="muted">基于每日 AI 资讯采集、结构化抽取、聚类与洞察结果自动生成。</p>
    </section>
    <section class="cards">
      <div class="card"><h3>样本量</h3><p id="sample-size"></p></div>
      <div class="card"><h3>热点事件数</h3><p id="hot-event-count"></p></div>
      <div class="card"><h3>聚类数</h3><p id="cluster-count"></p></div>
    </section>
    <section class="charts">
      <div class="panel"><h2>热点事件热度</h2><div id="chart-hot-events" class="chart"></div></div>
      <div class="panel"><h2>趋势分类分布</h2><div id="chart-trends" class="chart"></div></div>
      <div class="panel"><h2>高频实体 Top N</h2><div id="chart-entities" class="chart"></div></div>
    </section>
    <section class="two-col">
      <div class="panel">
        <h2>热点摘要</h2>
        <ul id="highlight-list"></ul>
      </div>
      <div class="panel">
        <h2>风险与机会</h2>
        <h3>风险</h3>
        <ul id="risk-list"></ul>
        <h3>机会</h3>
        <ul id="opportunity-list"></ul>
      </div>
    </section>
  </div>
  <script>
    const payload = {"date": "2026-05-23", "summary": {"sample_size": 20, "hot_event_count": 5, "cluster_count": 9}, "highlights": ["OpenAI发布GPT-5：多模态推理能力大幅提升", "欧盟AI法案正式生效，企业面临合规新挑战", "Study warns of AI-generated content quality risks", "国内AI芯片企业完成新一轮融资", "AI辅助药物研发取得新突破"], "risk_alerts": ["欧盟 AI 法案正式生效，高风险 AI 系统将被要求满足透明度、数据治理与人类监督要求，相关企业需要尽快补齐合规能力。", "The European Union has started enforcing the AI Act, creating new compliance requirements for high-risk artificial intelligence systems and governance practices.", "Major accounting firms are deploying AI audit systems, automating routine work and raising concerns about workforce shifts, compliance risk, and governance."], "opportunity_alerts": ["OpenAI has launched GPT-5 with stronger multimodal reasoning, a larger context window, and enterprise-ready AI agent capabilities for developers.", "Meta 开源 Llama 4 系列模型，并发布配套微调与部署工具，帮助企业更低成本地采用开源大模型方案。", "Meta has released Llama 4, an open source foundation model that competes with proprietary AI systems and expands the open model ecosystem for enterprise adoption.", "一家国内 AI 芯片企业宣布完成新一轮融资，资金将用于下一代训练芯片研发和量产，显示资本市场对 AI 基础设施持续看好。", "NeurIPS 最新统计显示，生成式 AI 与智能体方向论文增长显著，反映研究社区的热点正从单模型能力扩展到系统协作能力。"], "charts": [{"type": "bar", "title": "热点事件热度", "data": [{"label": "OpenAI发布GPT-5：多模态推理能力大幅提升", "value": 10.0}, {"label": "欧盟AI法案正式生效，企业面临合规新挑战", "value": 9.3}, {"label": "Study warns of AI-generated content quality risks", "value": 7.6}, {"label": "国内AI芯片企业完成新一轮融资", "value": 7.1}, {"label": "AI辅助药物研发取得新突破", "value": 6.7}]}, {"type": "bar", "title": "趋势分类分布", "data": [{"label": "技术", "value": 2}, {"label": "应用", "value": 3}, {"label": "政策", "value": 1}, {"label": "资本", "value": 1}]}, {"type": "bar", "title": "高频实体 Top N", "data": [{"label": "ai", "value": 5}, {"label": "OpenAI", "value": 3}, {"label": "DeepSeek", "value": 3}, {"label": "Meta", "value": 3}, {"label": "深度求索", "value": 2}, {"label": "苹果", "value": 2}, {"label": "act", "value": 2}, {"label": "firms", "value": 2}]}], "generated_at": "2026-05-28T13:32:45.313043+00:00"};
    document.getElementById('report-date').textContent = payload.date;
    document.getElementById('sample-size').textContent = payload.summary.sample_size;
    document.getElementById('hot-event-count').textContent = payload.summary.hot_event_count;
    document.getElementById('cluster-count').textContent = payload.summary.cluster_count;

    const renderList = (elementId, items, emptyText) => {
      const target = document.getElementById(elementId);
      const values = items && items.length ? items : [emptyText];
      target.innerHTML = values.map(item => `<li>${item}</li>`).join('');
    };

    renderList('highlight-list', payload.highlights, '暂无热点摘要');
    renderList('risk-list', payload.risk_alerts, '暂无风险提示');
    renderList('opportunity-list', payload.opportunity_alerts, '暂无机会提示');

    const renderBarChart = (elementId, chart) => {
      const instance = echarts.init(document.getElementById(elementId));
      instance.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: 60, right: 24, top: 30, bottom: 80 },
        xAxis: {
          type: 'category',
          data: chart.data.map(item => item.label),
          axisLabel: { interval: 0, rotate: 25 }
        },
        yAxis: { type: 'value' },
        series: [{
          type: 'bar',
          data: chart.data.map(item => item.value),
          itemStyle: { color: '#2563eb' },
          barMaxWidth: 48,
        }],
      });
    };

    renderBarChart('chart-hot-events', payload.charts[0]);
    renderBarChart('chart-trends', payload.charts[1]);
    renderBarChart('chart-entities', payload.charts[2]);
  </script>
</body>
</html>
