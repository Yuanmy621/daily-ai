pipeline:
  min_news_count: 10
  max_news_count: 20
  collect_batch_size: 10
  normalize_batch_size: 10
  extract_batch_size: 3
  cluster_batch_size: 20
  insight_batch_size: 5
  report_batch_size: 1
  max_age_days: 7
  rss_fetch_timeout: 30
  dedup_threshold: 0.85

validation:
  min_content_length: 50
  max_content_length: 50000
  strict: false

naming:
  raw: raw_news_{date}.json
  normalized: normalized_news_{date}.json
  structured: structured_news_{date}.json
  clusters: clusters_{date}.json
  insights: daily_insight_{date}.json
  report: daily_report_{date}.md
  visualization: visualization_{date}.json

report:
  title: Daily AI Insight Report
  language: zh-CN

